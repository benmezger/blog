{{- $src := .Get "src" -}}
{{- $height := .Get "height" | default "800px" -}}
{{- $id := printf "pdf-%s" (md5 $src) -}}

<div id="{{ $id }}" class="pdf-viewer" style="height: {{ $height }}; overflow: auto; background: #1a1a1a; border: 1px solid #444; border-radius: 4px; padding: 8px; display: flex; flex-direction: column; align-items: center; gap: 8px;">
</div>

<script type="module">
  if (!window.pdfjsLib) {
    window.pdfjsLib = await import("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs");
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs";
  }

  var container = document.getElementById("{{ $id }}");
  var pdf = await window.pdfjsLib.getDocument("{{ $src }}").promise;

  for (var i = 1; i < pdf.numPages + 1; i++) {
    var page = await pdf.getPage(i);
    var viewport = page.getViewport({ scale: 1 });
    var scale = (container.clientWidth - 16) / viewport.width;
    viewport = page.getViewport({ scale: scale });

    var canvas = document.createElement("canvas");
    var dpr = window.devicePixelRatio || 1;
    canvas.width = viewport.width * dpr;
    canvas.height = viewport.height * dpr;
    canvas.style.width = viewport.width + "px";
    canvas.style.height = viewport.height + "px";
    canvas.getContext("2d").setTransform(dpr, 0, 0, dpr, 0, 0);

    await page.render({ canvasContext: canvas.getContext("2d"), viewport: viewport }).promise;
    container.appendChild(canvas);
  }
</script>
