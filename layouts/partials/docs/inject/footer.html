<center>
  {{ $related := .Site.RegularPages.Related . | first 1 }}
    {{ with $related }}
      {{ range . }}
      <h3>Go to <a href="{{ .RelPermalink }}">random</a> page</h3>
    {{ end }}
  {{ end }}
</center>
{{ if not (and (eq .Type "notes") .IsPage) }}
  {{ with .OutputFormats.Get "Markdown" }}
  <div style="text-align: right; font-size: 0.85em;">
    <a href="{{ .Permalink }}">view markdown</a>
  </div>
  {{ end }}
{{ end }}
