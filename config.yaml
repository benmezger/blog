baseURL: https://seds.nl/

mediaTypes:
  text/markdown:
    suffixes:
      - md

outputFormats:
  Markdown:
    mediaType: "text/markdown"
    baseName: "index"
    isHTML: false
    isPlainText: true
    rel: "alternate"

outputs:
  page: ["HTML", "Markdown"]
  home: ["HTML", "RSS", "Markdown"]
  section: ["HTML", "RSS", "Markdown"]
  taxonomy: ["HTML", "RSS", "Markdown"]
  term: ["HTML", "RSS", "Markdown"]

locale: en-us
title: Ben Mezger
theme: book
enableRobotsTXT: true
disqusShortname: benmezger
googleAnalytics: G-7VNN5HP47Z

enableGitInfo: true
enableEmoji: true

# Needed for mermaid/katex shortcodes
markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 1

languages:
  en:
    label: English
    contentDir: content
    weight: 1
#  pt:
#    languageName: Portuguese
#    contentDir: content.pt
#    weight: 1

params:
  BookServiceWorker: true
  BookToC: true
  BookSearch: true
  BookLastChangeLink: 'https://github.com/benmezger/blog/commit/{{ .GitInfo.Hash }}'
  BookEditLink: 'https://github.com/benmezger/blog/edit/main/{{ .Path }}'
  BookTheme: "dark"
  CommentTheme: "github-dark"
  BookIcon: "menu"

copyright: '[© CC BY 4.0](https://creativecommons.org/licenses/by/4.0/legalcode)'

menu:
  before:
    - name: Notes
      url: /notes
      weight: 1
    - name: Contact
      url: /contact
      weight: 2
  after:
    - name: RSS
      url: /index.xml
      weight: 3
    - name: All my links
      url: https://links.seds.nl
      weight: 4
